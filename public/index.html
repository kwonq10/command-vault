<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Command収集器</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="launcher">
      <header class="window-header">
        <div class="brand">
          <span class="brand-mark">/</span>
          <span>Command収集器</span>
        </div>
        <div class="window-controls">
          <select id="language-select" aria-label="Description language">
            <option value="ja">日本語</option>
            <option value="en">English</option>
          </select>
          <button id="minimize-btn" type="button" title="最小化" aria-label="Minimize">－</button>
          <button id="close-button" class="window-close" type="button" aria-label="Close">×</button>
        </div>
      </header>

      <section class="input-area">
        <form id="add-form" class="add-form">
          <input id="command-input" type="text" placeholder="/compact" autocomplete="off" />
          <button type="submit">Add</button>
        </form>
      </section>

      <p id="error" class="error" hidden></p>

      <div id="list-toggle-bar" role="button" tabindex="0" aria-expanded="false" aria-controls="list-area">
        <span id="list-toggle-arrow">▼</span>
        <span>コマンド一覧 (<span id="list-count">0</span>)</span>
      </div>

      <div id="list-area" style="display: none;">
        <section class="command-panel" aria-label="Commands">
          <div id="commands-list" class="commands-list"></div>
        </section>
      </div>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
